<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/global.css">
</head>
<body class="login-page">
<div class="login-card">
    <h1>Entrar</h1>
    <p class="login-subtitle">Acesse o sistema de estoque</p>

    <form id="loginForm" class="login-form">
        <div class="form-group">
            <label for="usuario">Usuário</label>
            <input id="usuario" name="usuario" type="text" placeholder="Digite seu usuário" required>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input id="senha" name="senha" type="password" placeholder="Digite sua senha" required>
        </div>

        <p id="loginMessage" class="login-message" aria-live="polite"></p>
        <button type="submit" class="btn btn-primary">Entrar</button>
    </form>

    <p class="auth-link-wrapper">
        Ainda não tem conta?
        <a href="register.html" class="auth-link">Criar conta</a>
    </p>
    <p class="auth-link-wrapper">
        Esqueceu a senha?
        <a href="resetpassword.html" class="auth-link">Resetar senha</a>
    </p>
</div>

<script src="scripts/script_login.js"></script>
</body>
</html>
