<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="styles/global.css">
</head>
<body class="login-page">
<div class="login-card">
    <h1>Criar conta</h1>
    <p class="login-subtitle">Cadastre-se para acessar o sistema</p>

    <form id="registerForm" class="login-form">
        <div class="form-group">
            <label for="nome">Nome</label>
            <input id="nome" name="nome" type="text" placeholder="Digite seu nome" required>
        </div>

        <div class="form-group">
            <label for="usuario">Usuário</label>
            <input id="usuario" name="usuario" type="text" placeholder="Digite um usuário" required>
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" placeholder="Digite seu e-mail" required>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input id="senha" name="senha" type="password" placeholder="Crie uma senha" required>
        </div>

        <p id="registerMessage" class="login-message" aria-live="polite"></p>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
    </form>

    <p class="auth-link-wrapper">
        Já tem conta?
        <a href="login.html" class="auth-link">Entrar</a>
    </p>
</div>

<script src="scripts/script_register.js"></script>
</body>
</html>
