<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação 2FA</title>
    <link rel="stylesheet" href="styles/global.css">
</head>
<body class="login-page">
<div class="login-card">
    <div class="page-logo"><i class="fas fa-shield-alt"></i></div>
    <h1><i class="fas fa-shield-alt"></i> Validação em 2 etapas</h1>
    <p class="login-subtitle">Informe o código de 6 dígitos do seu autenticador.</p>

    <form id="twoFaForm" class="login-form">
        <div class="form-group">
            <label for="twoFaCode">Código TOTP</label>
            <input id="twoFaCode" type="text" inputmode="numeric" maxlength="6" placeholder="000000" required>
        </div>

        <p id="twoFaMessage" class="login-message" aria-live="polite"></p>
        <button id="verifyTwoFaBtn" type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Validar código</button>
    </form>

    <div class="twofa-setup">
        <button id="setupTwoFaBtn" type="button" class="btn btn-secondary"><i class="fas fa-qrcode"></i> Configurar autenticador (QR)</button>
        <div id="twoFaSetupResult" class="twofa-setup-result hidden">
            <p class="login-subtitle">Escaneie o QR Code no app autenticador.</p>
            <img id="twoFaQrImage" alt="QR Code para configurar 2FA" class="twofa-qr-image">
            <p class="twofa-secret"><strong>Secret:</strong> <span id="twoFaSecretText"></span></p>
        </div>
    </div>

    <p class="auth-link-wrapper">
        <button type="button" id="backToLoginBtn" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Voltar ao login</button>
    </p>
</div>

<script src="scripts/config.js"></script>
<script src="scripts/auth_service.js"></script>
<script src="scripts/script_2fa.js"></script>
</body>
</html>
