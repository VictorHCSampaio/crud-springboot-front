<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetar Senha</title>
    <link rel="stylesheet" href="styles/global.css">
</head>
<body class="login-page">
<div class="login-card">
    <h1>Resetar Senha</h1>
    <p class="login-subtitle">Digite seu e-mail para receber instruções de reset</p>

    <div id="requestForm" class="reset-form">
        <form id="resetRequestForm" class="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="Digite seu e-mail" required>
            </div>

            <p id="requestMessage" class="login-message" aria-live="polite"></p>
            <button type="submit" class="btn btn-primary">Enviar Código</button>
        </form>
    </div>

    <div id="confirmForm" class="reset-form hidden">
        <form id="resetConfirmForm" class="login-form">
            <div class="form-group">
                <label for="token">Código de Verificação</label>
                <input id="token" name="token" type="text" placeholder="Digite o código recebido" required>
            </div>

            <div class="form-group">
                <label for="newPassword">Nova Senha</label>
                <input id="newPassword" name="newPassword" type="password" placeholder="Digite a nova senha" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Nova Senha</label>
                <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirme a nova senha" required>
            </div>

            <p id="confirmMessage" class="login-message" aria-live="polite"></p>
            <button type="submit" class="btn btn-primary">Resetar Senha</button>
        </form>
    </div>

    <p class="auth-link-wrapper">
        Lembrou a senha?
        <a href="login.html" class="auth-link">Voltar ao Login</a>
    </p>
</div>

<script src="scripts/config.js"></script>
<script src="scripts/script_resetpassword.js"></script>
</body>
</html>
