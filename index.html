<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque de Produtos</title>
    <link rel="stylesheet" href="styles/global.css">
    <script src="scripts/auth_service.js"></script>
    <script>
        requireFullAuth();
    </script>
</head>
<body>
<div class="container">
    <header class="header">
        <h1>📦 Estoque de Produtos</h1>
        <div class="header-actions">
            <a href="addproduct.html" class="btn btn-primary">+ Novo Produto</a>
            <button type="button" id="logoutBtn" class="btn btn-secondary">Sair</button>
        </div>
    </header>

    <form id="consultarId" class="search-area" onsubmit="consultarId(); return false;">
        <input type="number" name="id" placeholder="Buscar por ID..." required>
        <button type="submit" class="btn btn-secondary">Buscar</button>
        <button type="button" class="btn btn-secondary" onclick="listAllProducts()">Limpar</button>
    </form>

    <h3 id="loading" style="text-align: center; color: #64748b; margin-top: 2rem;">Carregando produtos...</h3>

    <div class="table-responsive">
        <table id="products"></table>
    </div>
</div>

<script src="scripts/script_listallproducts.js"></script>
<script>
    const logoutBtn = document.getElementById("logoutBtn");
    logoutBtn.addEventListener("click", async function () {
        logoutBtn.disabled = true;
        const previousText = logoutBtn.textContent;
        logoutBtn.textContent = "Saindo...";

        try {
            await signout();
        } catch (error) {
            console.error("Falha ao encerrar sessão no backend.", error);
        } finally {
            clearAuthState();
            logoutBtn.disabled = false;
            logoutBtn.textContent = previousText;
            window.location.href = "login.html";
        }
    });
</script>
</body>
</html>
